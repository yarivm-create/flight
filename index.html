<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת חיזוי וסיכונים - ארקיע</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 480px; }

        button#refreshBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #2563eb);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        /* מנוע ניהול סיכונים */
        .risk-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid transparent;
            transition: all 0.4s;
        }

        .risk-score { font-size: 64px; font-weight: 900; line-height: 1; margin: 10px 0; }
        .risk-label { font-size: 20px; font-weight: bold; margin-bottom: 10px; }

        /* כרטיס טיסה אישי */
        .my-flight {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border-right: 5px solid var(--primary);
        }

        /* בורר מצב חיצוני (מדיה/בטחוני) */
        .news-factor-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: space-between;
        }

        .factor-btn {
            flex: 1;
            padding: 8px;
            font-size: 11px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #1e293b;
            color: white;
            cursor: pointer;
        }

        .factor-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        .issue-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <button id="refreshBtn" onclick="updateDashboard()">🔄 רענן ונתח נתונים</button>

    <div style="font-size: 12px; margin-bottom: 8px; opacity: 0.7;">עדכון פקטור חיצוני (חדשות/מדיה):</div>
    <div class="news-factor-selector">
        <button class="factor-btn active" onclick="setNewsFactor(0, this)">שגרה 🟢</button>
        <button class="factor-btn" onclick="setNewsFactor(15, this)">כוננות/מתח 🟡</button>
        <button class="factor-btn" onclick="setNewsFactor(40, this)">הסלמה/שביתה 🔴</button>
    </div>

    <div id="risk-container" class="risk-card">
        <div style="font-size: 14px; opacity: 0.8;">מדד סיכון ביטול (Probability)</div>
        <div id="risk-score" class="risk-score">0%</div>
        <div id="risk-label" class="risk-label">מנתח...</div>
        <div id="risk-desc" style="font-size: 12px; opacity: 0.6;">משקלל נתוני ארקיע, נתב"ג וחדשות</div>
    </div>

    <div class="my-flight">
        <div id="my-flight-status" style="float: left; font-weight: bold; color: var(--success);">בזמן</div>
        <div style="font-size: 14px; opacity: 0.7;">IZ 1335 | רומא</div>
        <div id="my-flight-time" style="font-size: 24px; font-weight: bold; margin: 5px 0;">--:-- | 02.04</div>
        <div id="my-flight-details" style="font-size: 12px; color: var(--primary);">טרמינל -- | צ'ק-אין: --</div>
    </div>

    <div style="margin-bottom: 10px; font-size: 14px; font-weight: bold;">⚠️ שיבושים חיים (ארקיע):</div>
    <div id="issues-list"></div>
</div>

<script>
    // כתובת ה-Proxy שלך (Google Apps Script)
    const PROXY_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec"; 
    
    let currentNewsFactor = 0;

    function setNewsFactor(val, btn) {
        currentNewsFactor = val;
        document.querySelectorAll('.factor-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateDashboard(); // עדכון מיידי של המדד
    }

    async function updateDashboard() {
        const btn = document.getElementById('refreshBtn');
        btn.innerText = "⏳ מנתח סיכונים...";
        
        try {
            const response = await fetch(PROXY_URL);
            const data = await response.json();
            const records = data.result.records;

            // 1. חישוב סטטיסטיקה
            const totalCanceledAll = records.filter(f => String(f.CHRMINE || "").includes('CANCELED')).length;
            const avgBenGurion = (totalCanceledAll / records.length) * 100;

            const arkia = records.filter(f => String(f.CHOPER || "").includes('IZ'));
            const arkiaCanceled = arkia.filter(f => String(f.CHRMINE || "").includes('CANCELED')).length;
            const arkiaPerc = (arkiaCanceled / arkia.length) * 100;

            // 2. מנוע חישוב סיכון (משקולות)
            // 40% ארקיע + 20% נתב"ג + פקטור חדשות
            let totalRisk = Math.round((arkiaPerc * 0.4) + (avgBenGurion * 0.2) + currentNewsFactor);
            if (totalRisk > 100) totalRisk = 100;

            // עדכון ויזואלי של המדד
            const riskScoreElem = document.getElementById('risk-score');
            const riskLabelElem = document.getElementById('risk-label');
            const riskCard = document.getElementById('risk-container');

            riskScoreElem.innerText = totalRisk + "%";
            
            if (totalRisk < 30) {
                riskLabelElem.innerText = "סיכון נמוך ✅";
                riskCard.style.borderColor = "var(--success)";
                riskScoreElem.style.color = "var(--success)";
            } else if (totalRisk < 60) {
                riskLabelElem.innerText = "סיכון בינוני ⚠️";
                riskCard.style.borderColor = "var(--warning)";
                riskScoreElem.style.color = "var(--warning)";
            } else {
                riskLabelElem.innerText = "סיכון גבוה 🚨";
                riskCard.style.borderColor = "var(--danger)";
                riskScoreElem.style.color = "var(--danger)";
            }

            // 3. עדכון הטיסה שלך
            const myFlight = arkia.find(f => String(f.CHFLTN) === "1335") || arkia[0];
            if (myFlight) {
                const [d, t] = myFlight.CHSTOL.split('T');
                document.getElementById('my-flight-time').innerText = `${t.substring(0,5)} | 02.04`;
                document.getElementById('my-flight-details').innerText = `טרמינל ${myFlight.CHTERM || '3'} | צ'ק-אין: ${myFlight.CHCKZN || 'טרם נקבע'}`;
                
                const status = String(myFlight.CHRMINE || "");
                const statusElem = document.getElementById('my-flight-status');
                statusElem.innerText = status.includes('CANCELED') ? "מבוטלת" : (status.includes('DELAYED') ? "מעוכבת" : "בזמן");
                statusElem.style.color = status.includes('CANCELED') ? "var(--danger)" : "var(--success)";
            }

            // 4. רשימת שיבושים
            const list = document.getElementById('issues-list');
            list.innerHTML = "";
            const issues = arkia.filter(f => String(f.CHRMINE || "").includes('CANCELED') || String(f.CHRMINE || "").includes('DELAYED'));
            
            issues.slice(0, 5).forEach(f => {
                list.innerHTML += `
                    <div class="issue-item">
                        <span>IZ ${f.CHFLTN} ל${f.CHLOC1TH}</span>
                        <span style="color:var(--danger)">${f.CHRMINH}</span>
                    </div>`;
            });

        } catch (e) {
            console.error(e);
            document.getElementById('risk-label').innerText = "שגיאת נתונים";
        }
        btn.innerText = "🔄 רענן ונתח נתונים";
    }

    updateDashboard();
</script>

</body>
</html>
