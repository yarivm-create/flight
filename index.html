<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכ"ם טיסות ארקיע - דאשבורד אישי</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #f8fafc;
            --accent: #2563eb;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 480px; }

        #refreshBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: transform 0.2s;
        }
        #refreshBtn:active { transform: scale(0.98); }

        .my-flight-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1.5px solid var(--primary);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 800;
        }

        .flight-time-big {
            font-size: 48px;
            font-weight: 800;
            margin: 10px 0;
            letter-spacing: -1px;
        }

        .details-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 14px;
            opacity: 0.9;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .stats-box {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
        }

        .perc-display { font-size: 72px; font-weight: 900; color: var(--primary); line-height: 1; }
        
        .issue-section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .issue-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 12px;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--warning);
        }

        .issue-item.canceled { border-right-color: var(--danger); }

        .flight-info b { font-size: 16px; display: block; margin-top: 2px; }
        .time-text { font-size: 13px; opacity: 0.6; }
        .delay-arrow { color: var(--warning); margin: 0 4px; }

        .tag {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <button id="refreshBtn" onclick="updateDashboard()">🔄 רענן נתונים עכשיו</button>

    <div class="my-flight-card">
        <div id="my-status" class="status-badge" style="background: var(--success)">טוען...</div>
        <div style="opacity: 0.7; font-size: 14px;">הטיסה שלי לרומא (IZ 1335)</div>
        <div class="flight-time-big" id="my-time">--:-- | --.--</div>
        <div class="details-row">
            <span id="my-terminal">טרמינל --</span>
            <span>|</span>
            <span id="my-checkin">צ'ק-אין: --</span>
        </div>
        <div id="my-update-note" style="font-size: 12px; color: var(--success); font-weight: bold;">בדיקת סטטוס...</div>
    </div>

    <div class="stats-box">
        <div style="font-size: 14px; opacity: 0.7;">מדד ביטולי ארקיע (48 ש')</div>
        <div id="perc" class="perc-display">0%</div>
        <div id="comparison-msg" style="font-size: 15px; font-weight: bold; margin-top: 5px;">מנתח נתונים...</div>
        <div id="stats-summary" style="font-size: 12px; opacity: 0.5; margin-top: 12px;"></div>
    </div>

    <div class="issue-section-title">
        <span>⚠️ שיבושים בארקיע</span>
        <span id="issue-count" style="font-size: 14px; opacity: 0.6;">(0)</span>
    </div>
    
    <div id="issues-list"></div>
</div>

<script>
    // שים כאן את הכתובת של ה-Google Apps Script שפרסמת (Deployment URL)
    const PROXY_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec"; 

    async function updateDashboard() {
        const btn = document.getElementById('refreshBtn');
        btn.innerText = "⏳ מושך נתונים מהשרת...";
        
        try {
            // קריאה ל-Proxy שלך
            const response = await fetch(PROXY_URL);
            const data = await response.json();
            
            // וידוא שהנתונים הגיעו במבנה של משרד התחבורה
            const records = data.result.records;

            // 1. חישוב ממוצע נתב"ג
            const totalCanceledAll = records.filter(f => String(f.CHRMINE || "").includes('CANCELED')).length;
            const avgBenGurion = Math.round((totalCanceledAll / records.length) * 100) || 0;

            // 2. סינון ארקיע (IZ)
            const arkia = records.filter(f => String(f.CHOPER || "").includes('IZ'));
            const issues = arkia.filter(f => 
                String(f.CHRMINE || "").includes('CANCELED') || 
                String(f.CHRMINE || "").includes('DELAYED') ||
                (f.CHPTOL && f.CHSTOL !== f.CHPTOL)
            );

            const arkiaCanceled = issues.filter(f => String(f.CHRMINE).includes('CANCELED')).length;
            const arkiaPerc = Math.round((arkiaCanceled / arkia.length) * 100) || 0;

            // עדכון המדד
            document.getElementById('perc').innerText = arkiaPerc + "%";
            const compElem = document.getElementById('comparison-msg');
            if (arkiaPerc > avgBenGurion) {
                compElem.innerText = `🚨 גבוה מממוצע נתב"ג (${avgBenGurion}%)`;
                compElem.style.color = "var(--danger)";
            } else {
                compElem.innerText = `✅ נמוך מממוצע נתב"ג (${avgBenGurion}%)`;
                compElem.style.color = "var(--success)";
            }
            document.getElementById('stats-summary').innerText = `מתוך ${arkia.length} טיסות ארקיע, ${issues.length} בשיבוש`;
            document.getElementById('issue-count').innerText = `(${issues.length})`;

            // 3. עדכון הטיסה שלך (IZ 1335)
            const myFlight = arkia.find(f => String(f.CHFLTN) === "1335") || arkia[0]; 

            if (myFlight) {
                const status = String(myFlight.CHRMINE || "");
                const isC = status.includes('CANCELED');
                const isD = status.includes('DELAYED');
                
                const statusBtn = document.getElementById('my-status');
                statusBtn.innerText = isC ? "מבוטלת" : (isD ? "מעוכבת" : "בזמן");
                statusBtn.style.background = isC ? "var(--danger)" : (isD ? "var(--warning)" : "var(--success)");
                
                const [datePart, timePart] = myFlight.CHSTOL.split('T');
                const dateArr = datePart.split('-');
                const formattedDate = `${dateArr[2]}.${dateArr[1]}`;
                document.getElementById('my-time').innerText = `${timePart.substring(0,5)} | ${formattedDate}`;
                
                document.getElementById('my-terminal').innerText = `טרמינל ${myFlight.CHTERM || '3'}`;
                document.getElementById('my-checkin').innerText = `צ'ק-אין: ${myFlight.CHCKZN || 'טרם פורסם'}`;
                document.getElementById('my-update-note').innerText = isC ? "צור קשר עם החברה" : "טיסה נעימה! ✈️";
            }

            // 4. רשימת השיבושים
            const list = document.getElementById('issues-list');
            list.innerHTML = "";
            
            issues.forEach(f => {
                const isC = String(f.CHRMINE).includes('CANCELED');
                const sched = f.CHSTOL.split('T')[1].substring(0,5);
                const actual = f.CHPTOL ? f.CHPTOL.split('T')[1].substring(0,5) : sched;
                
                let timeHTML = sched;
                if (!isC && sched !== actual) {
                    timeHTML = `${sched} <span class="delay-arrow">⬅️</span> ${actual}`;
                }

                list.innerHTML += `
                    <div class="issue-item ${isC ? 'canceled' : ''}">
                        <div class="flight-info">
                            <span class="time-text">זמן: ${timeHTML}</span>
                            <b>IZ ${f.CHFLTN} ל${f.CHLOC1TH || '---'}</b>
                        </div>
                        <span class="tag" style="background: ${isC ? 'rgba(239,68,68,0.1)' : 'rgba(245,158,11,0.1)'}; color: ${isC ? 'var(--danger)' : 'var(--warning)'}">
                            ${isC ? 'בוטלה' : 'שיבוש'}
                        </span>
                    </div>`;
            });

        } catch (e) {
            console.error("Error:", e);
            document.getElementById('comparison-msg').innerText = "שגיאה בחיבור ל-Proxy";
        }
        btn.innerText = "🔄 רענן נתונים עכשיו";
    }

    updateDashboard();
</script>

</body>
</html>
