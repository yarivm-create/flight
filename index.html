<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IZ 1335 Monitor - Arkia Live Scan</title>
    <style>
        :root { --danger: #ef4444; --bg: #020617; --card: #0f172a; --primary: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f8fafc; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .main-card { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 25px; padding: 30px; text-align: center; border: 2px solid var(--danger); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .score { font-size: 90px; font-weight: 900; line-height: 1; margin: 15px 0; color: var(--danger); }
        .flag-pill { display: inline-block; background: rgba(239, 68, 68, 0.2); color: var(--danger); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin: 3px; border: 1px solid var(--danger); }
        .refresh-btn { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .status-box { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin: 15px 0; border-right: 4px solid var(--primary); text-align: right; }
        .flight-info { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div style="font-size: 12px; opacity: 0.7;">סיכוי ביטול IZ 1335 (02.04)</div>
        <div id="riskScore" class="score">--%</div>
        <div id="statusLabel" style="font-size: 22px; font-weight: bold;">מנתח אתר ארקיע...</div>
        <div id="updateTime" style="font-size: 11px; opacity: 0.5; margin-top: 10px;"></div>
        <button class="refresh-btn" onclick="fetchData()">🔄 סרוק אתר ארקיע עכשיו</button>
    </div>

    <div class="status-box">
        <div style="font-weight: bold; color: var(--primary); margin-bottom: 10px;">🚩 מילות מפתח שזוהו באתר ארקיע (Live):</div>
        <div id="flagContainer">מחפש "50 נוסעים", "שאגת הארי", "ביטולים"...</div>
    </div>

    <div class="flight-info">
        <span>טיסה: <b>IZ 1335</b> (רומא)</span>
        <span id="flightStatus" style="color: var(--danger); font-weight: bold;">בסיכון קריטי</span>
    </div>
</div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec";

    async function fetchData() {
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            
            const flags = data.arkiaLive.foundFlags;
            const records = data.records;

            // עדכון מילות מפתח ב-UI
            const flagContainer = document.getElementById('flagContainer');
            if (flags.length > 0) {
                flagContainer.innerHTML = flags.map(f => `<span class="flag-pill">${f}</span>`).join('');
            } else {
                flagContainer.innerHTML = "לא נמצאו מילות מפתח חריגות כרגע.";
            }

            // חישוב ציון (אם נמצאו מילים כמו "50 נוסעים" או "ביטול" - הציון קופץ)
            let score = 20;
            if (flags.includes("50 נוסעים")) score += 30;
            if (flags.includes("ביטול") || flags.includes("4.4")) score += 40;
            if (flags.includes("שאגת הארי")) score += 5;
            
            if (score > 98) score = 98;

            // עדכון UI
            document.getElementById('riskScore').innerText = score + "%";
            document.getElementById('updateTime').innerText = "סריקה אחרונה: " + data.arkiaLive.timestamp;
            document.getElementById('statusLabel').innerText = score > 70 ? "מתווה חירום פעיל 🚨" : "שגרה יחסית";
            
        } catch (e) {
            console.error(e);
            document.getElementById('statusLabel').innerText = "שגיאת תקשורת";
        }
    }

    fetchData();
</script>
</body>
</html>
