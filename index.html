<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מכ"ם טיסות IZ 1335 - Live</title>
    <style>
        :root { --danger: #ef4444; --bg: #020617; --primary: #38bdf8; --card: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f8fafc; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .main-card { background: #111827; border-radius: 25px; padding: 25px; text-align: center; border: 2px solid var(--danger); box-shadow: 0 10px 40px rgba(239, 68, 68, 0.2); }
        .score { font-size: 80px; font-weight: 900; color: var(--danger); margin: 5px 0; }
        .info-box { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 15px; border-right: 4px solid var(--primary); text-align: right; }
        .flag-pill { display: inline-block; background: rgba(239, 68, 68, 0.2); color: var(--danger); padding: 4px 10px; border-radius: 10px; font-size: 12px; margin: 3px; border: 1px solid var(--danger); }
        button { background: var(--primary); color: black; border: none; padding: 15px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .flight-status { display: flex; justify-content: space-between; padding: 10px; background: #1e293b; border-radius: 10px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div style="font-size: 12px; opacity: 0.7;">סיכוי ביטול IZ 1335 (02.04)</div>
        <div id="riskScore" class="score">--%</div>
        <div id="statusLabel" style="font-size: 18px; font-weight: bold;">מנתח נתונים...</div>
        <button onclick="fetchData()">🔄 רענן נתונים עכשיו</button>
        <div id="updateTime" style="font-size: 10px; opacity: 0.5; margin-top: 8px;"></div>
    </div>

    <div class="info-box">
        <div style="font-weight: bold; color: var(--primary); margin-bottom: 8px;">🔍 עקבות מתווה (50 נוסעים / סגירה):</div>
        <div id="flagContainer">מחפש מילות מפתח בלוח הטיסות...</div>
    </div>

    <div class="flight-status">
        <span>טיסה IZ 1335</span>
        <span id="izStatus" style="color: var(--danger)">טוען...</span>
    </div>
</div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec"; 

    // מילות מפתח לחיפוש בתוך ה-API
    const keywords = ["50", "חילוץ", "שאגת הארי", "מתווה", "סגור", "בטחוני", "עקבה"];

    async function fetchData() {
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            const records = data.records;

            // 1. חיפוש מילות מפתח בתוך כל הערות הטיסה בנתב"ג
            let found = [];
            records.forEach(f => {
                const note = String(f.CHRMINE || "");
                keywords.forEach(word => {
                    if (note.includes(word) && !found.includes(word)) found.push(word);
                });
            });

            // 2. חיפוש ספציפי של הטיסה שלך
            const myFlight = records.find(f => String(f.CHFLTN).includes("1335"));
            
            // 3. חישוב ציון (מבוסס על המידע שארקיע מבטלת עד 04.04 + ממצאים בלוח)
            let score = 85; // רצפת סיכון בגלל הודעת ארקיע הרשמית
            if (found.length > 0) score += 10;
            if (myFlight && String(myFlight.CHRMINE).includes("CANCELED")) score = 100;

            // עדכון UI
            document.getElementById('riskScore').innerText = Math.min(score, 98) + "%";
            document.getElementById('statusLabel').innerText = score > 90 ? "מתווה חירום פעיל 🚨" : "בסיכון גבוה";
            document.getElementById('updateTime').innerText = "עדכון אחרון: " + data.serverTime;
            document.getElementById('flagContainer').innerHTML = found.map(f => `<span class="flag-pill">${f}</span>`).join('') || "לא נמצאו מילות מפתח כרגע";
            document.getElementById('izStatus').innerText = myFlight ? "מופיעה בלוח" : "לא נמצאה (בוטלה?)";

        } catch (e) {
            document.getElementById('statusLabel').innerText = "שגיאה בחיבור לגוגל";
        }
    }

    fetchData();
</script>
</body>
</html>
