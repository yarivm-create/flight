<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkia Monitor | 02.04 Italy</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --text: #f8fafc; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: right; }
        .container { max-width: 500px; margin: 0 auto; }
        .status-header { background: linear-gradient(135deg, #0284c7, #0369a1); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .risk-value { font-size: 3rem; font-weight: 900; margin: 10px 0; }
        .heatmap-container { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        .destination-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .dest-tag { padding: 8px; border-radius: 8px; font-size: 0.75rem; text-align: center; background: #334155; border: 1px solid transparent; }
        .high-risk { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .low-risk { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .flight-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; border: 1px solid #334155; align-items: center; }
        .prediction-box { background: #0c4a6e; border: 1px solid var(--accent); padding: 15px; border-radius: 15px; margin-top: 20px; }
        button { background: var(--accent); color: #0f172a; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .footer { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-header">
        <div style="font-size:0.9rem; opacity:0.8;">מדד ביטולים ארקיע (כללי)</div>
        <div class="risk-value" id="global-index">--%</div>
        <div id="risk-summary">מתחבר לנתב"ג...</div>
    </div>

    <div class="heatmap-container">
        <div style="font-weight:bold; color:var(--accent);">מפת חום יעדים (ביטולים)</div>
        <div class="destination-grid" id="heatmap-grid"></div>
    </div>

    <div id="flights-list"></div>

    <div class="prediction-box">
        <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">📍 תחזית איטליה (02.04)</div>
        <div id="italy-forecast" style="font-size: 0.9rem; line-height: 1.5;">ממתין לנתונים...</div>
    </div>

    <button id="refresh-btn">🔄 עדכן נתונים (Live)</button>
    <div class="footer" id="update-time"></div>
</div>

<script>
    async function loadFlightData() {
        const summary = document.getElementById('risk-summary');
        const targetUrl = "https://data.gov.il/api/3/action/datastore_search?resource_id=e83f7610-e348-4030-8a10-27297e30c2c1&limit=400";
        
        // ננסה להשתמש בפרוקסי אחר - Cors.sh (דורש רק שליחת headers פשוטים)
        summary.innerText = "מושך נתונים מנתב\"ג...";
        
        try {
            // ניסיון עם AllOrigins בשיטה שונה (נוסיף timestamp למניעת caching)
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&ts=${Date.now()}`);
            
            if (!response.ok) throw new Error("Proxy error");
            
            const proxyData = await response.json();
            const data = JSON.parse(proxyData.contents);
            const records = data.result.records;
            
            const arkia = records.filter(f => {
                const op = String(f.CHOPER || "");
                return op.includes('IZ') || op.includes('ARKIA');
            });
            
            if (arkia.length === 0) {
                summary.innerText = "אין טיסות ארקיע בלוח כרגע";
                return;
            }

            processAndRender(arkia);
        } catch (err) {
            console.error("Fetch error:", err);
            summary.innerText = "שגיאה זמנית בחיבור. נסה לרענן.";
        }
    }

    function processAndRender(flights) {
        const grid = document.getElementById('heatmap-grid');
        const list = document.getElementById('flights-list');
        const stats = {};
        let canceledTotal = 0;

        list.innerHTML = "";
        grid.innerHTML = "";

        flights.forEach(f => {
            const dest = String(f.CHLOCCT || "לא ידוע").trim();
            const status = String(f.CHRMINE || "").trim();
            const isCanceled = status.includes("CANCELED") || status.includes("מבוטלת");

            if (!stats[dest]) stats[dest] = { total: 0, canceled: 0 };
            stats[dest].total++;
            if (isCanceled) {
                stats[dest].canceled++;
                canceledTotal++;
            }

            if (list.children.length < 6) {
                const color = isCanceled ? 'var(--danger)' : 'var(--success)';
                list.innerHTML += `
                    <div class="flight-card" style="border-right: 4px solid ${color}">
                        <div>
                            <div style="font-size:0.7rem; color:var(--accent)">IZ ${f.CHFLTN}</div>
                            <div style="font-weight:bold; font-size:1.1rem;">${dest}</div>
                        </div>
                        <div style="color:${color}; font-weight:bold; font-size:0.8rem;">
                            ${isCanceled ? 'מבוטלת' : 'בזמן'}
                        </div>
                    </div>`;
            }
        });

        const perc = Math.round((canceledTotal / flights.length) * 100);
        document.getElementById('global-index').innerText = perc + "%";
        document.getElementById('risk-summary').innerText = perc > 25 ? "ביטולים חריגים" : "לוח טיסות פעיל";

        Object.keys(stats).slice(0, 9).forEach(d => {
            const ratio = stats[d].canceled / stats[d].total;
            const rClass = ratio > 0.2 ? 'high-risk' : (ratio > 0 ? 'low-risk' : '');
            grid.innerHTML += `<div class="dest-tag ${rClass}">${d}</div>`;
        });

        const it = stats["ITALY"] || stats["איטליה"] || { total: 0, canceled: 0 };
        const forecastElem = document.getElementById('italy-forecast');
        if (it.total > 0) {
            const r = Math.round((it.canceled / it.total) * 100);
            forecastElem.innerText = r > 20 ? `זוהו ביטולים לאיטליה (${r}%). כדאי לבדוק אלטרנטיבות.` : `הקו לאיטליה יציב כרגע.`;
        } else {
            forecastElem.innerText = "לא זוהו טיסות לאיטליה בטווח הזמן הקרוב.";
        }

        document.getElementById('update-time').innerText = "עדכון: " + new Date().toLocaleTimeString('he-IL');
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadFlightData();
        document.getElementById('refresh-btn').addEventListener('click', loadFlightData);
    });
</script>
</body>
</html>
