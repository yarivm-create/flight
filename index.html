<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנטר ביטולים ארקיע</title>
    <style>
        body { background: #0f172a; color: white; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        .index { font-size: 5rem; font-weight: bold; color: #38bdf8; margin: 10px 0; }
        .label { color: #94a3b8; font-size: 1rem; }
        .details { font-size: 0.8rem; margin-top: 15px; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">מדד ביטולים ארקיע</div>
        <div id="perc" class="index">--%</div>
        <div id="status" class="label">טוען נתונים...</div>
        <div id="stats" class="details"></div>
    </div>

    <script>
        // הדבק כאן את הקישור שקיבלת מגוגל בשלב 1
        const PROXY_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec"; 

        async function init() {
            try {
                const r = await fetch(PROXY_URL);
                const d = await r.json();
                const flights = d.result.records;

                // סינון ארקיע (IZ)
                const arkia = flights.filter(f => String(f.CHOPER).includes('IZ'));
                const canceled = arkia.filter(f => String(f.CHRMINE).includes('CANCELED')).length;
                
                const p = Math.round((canceled / arkia.length) * 100) || 0;
                
                document.getElementById('perc').innerText = p + "%";
                document.getElementById('status').innerText = "עודכן מנתב\"ג";
                document.getElementById('stats').innerText = `מתוך ${arkia.length} טיסות, ${canceled} בוטלו`;
            } catch (e) {
                document.getElementById('status').innerText = "שגיאה בחיבור";
            }
        }
        init();
    </script>
</body>
</html>
