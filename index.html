<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חמ"ל טיסות ארקיע - יריב</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: background 0.5s; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; margin-bottom: 20px; }
        .index-value { font-size: 5rem; font-weight: 900; color: var(--accent); margin: 10px 0; line-height: 1; }
        .my-flight { background: #1e293b; border: 2px solid var(--accent); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; margin-bottom: 20px; position: relative; }
        .countdown { font-size: 0.85rem; color: var(--accent); margin-top: 10px; font-weight: bold; }
        .flight-list { width: 100%; max-width: 450px; }
        .flight-item { background: rgba(255, 255, 255, 0.05); border-right: 4px solid var(--warning); padding: 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .flight-item.canceled { border-right-color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .btn-refresh { background: var(--accent); color: var(--bg); border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; width: 100%; max-width: 450px; font-size: 1rem; }
        .status-tag { padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .emergency { background: #450a0a !important; }
        .time-label { font-size: 0.75rem; opacity: 0.6; display: block; }
    </style>
</head>
<body>

    <button class="btn-refresh" onclick="updateDashboard()">🔄 רענן נתונים עכשיו</button>

    <div class="my-flight">
        <div style="font-size: 0.95rem; opacity: 0.9;">הטיסה שלי לרומא (IZ 1335):</div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
            <b style="font-size: 1.4rem;">04.02 | 07:00</b>
            <span id="my-flight-status" class="status-tag" style="background: #475569;">בדיקה...</span>
        </div>
        <div id="countdown" class="countdown">מחשב זמן נותר...</div>
    </div>

    <div class="card" id="main-card">
        <div style="font-size: 0.9rem; color: #94a3b8;">מדד ביטולים ארקיע (48ש')</div>
        <div class="index-value" id="perc">--%</div>
        <div id="trend-msg" style="font-weight: bold;">טוען נתונים...</div>
        <div id="stats-text" style="font-size: 0.8rem; opacity: 0.6; margin-top: 8px;"></div>
    </div>

    <div class="flight-list">
        <h3 style="font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 10px; display: flex; justify-content: space-between;">
            <span>⚠️ טיסות בשיבוש / עיכוב:</span>
            <span id="issue-count" style="font-size: 0.9rem; opacity: 0.7;">0</span>
        </h3>
        <div id="issues-container"></div>
    </div>

    <script>
        const PROXY_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcPr8CclZ7mS-U0EwU9lYx3L66O0vA3M_R88v/exec"; 

        function updateCountdown() {
            const flightDate = new Date("2026-02-04T07:00:00");
            const now = new Date();
            const diff = flightDate - now;
            if (diff <= 0) { document.getElementById('countdown').innerText = "טיסה נעימה!"; return; }
            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('countdown').innerText = `עוד ${days} ימים ו-${hours} שעות להמראה`;
        }

        async function updateDashboard() {
            const btn = document.querySelector('.btn-refresh');
            btn.innerText = "מעדכן נתונים...";
            
            try {
                const res = await fetch(PROXY_URL);
                const data = await res.json();
                const records = data.result.records;

                const issues
