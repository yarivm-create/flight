<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנטר טיסות ארקיע</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #22c55e; --danger: #ef4444; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: right; }
        .container { max-width: 500px; margin: 0 auto; }
        .status-header { background: linear-gradient(135deg, #0284c7, #0369a1); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .risk-value { font-size: 3.5rem; font-weight: 900; margin: 10px 0; }
        .flight-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; border: 1px solid #334155; align-items: center; }
        button { background: var(--accent); color: #0f172a; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .loading { opacity: 0.6; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-header">
            <div style="font-size:0.9rem; opacity:0.8;">מדד ביטולים ארקיע (כללי)</div>
            <div class="risk-value" id="global-index">--%</div>
            <div id="status-text">מתחבר לנתוני נתב"ג...</div>
        </div>
        <div id="flights-list"></div>
        <button onclick="loadData()">🔄 עדכן נתונים עכשיו</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec";

        async function loadData() {
            const statusBox = document.getElementById('status-text');
            const list = document.getElementById('flights-list');
            statusBox.classList.add('loading');
            statusBox.innerText = "מושך נתונים...";

            try {
                // הקריאה הקריטית שתומכת בהפניה של גוגל
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();
                
                const arkia = data.result.records.filter(f => 
                    String(f.CHOPER || "").includes('IZ') || String(f.CHOPER || "").includes('ARKIA')
                );

                let canceledCount = 0;
                list.innerHTML = "";

                arkia.forEach(f => {
                    const isCanceled = String(f.CHRMINE || "").includes("CANCELED") || String(f.CHRMINE || "").includes("מבוטלת");
                    if (isCanceled) canceledCount++;

                    if (list.children.length < 6) {
                        const color = isCanceled ? 'var(--danger)' : 'var(--success)';
                        list.innerHTML += `
                            <div class="flight-card" style="border-right: 5px solid ${color}">
                                <div><b>IZ ${f.CHFLTN}</b><br><small>${f.CHLOCCT}</small></div>
                                <div style="color:${color}; font-weight:bold;">${isCanceled ? 'מבוטלת' : 'בזמן'}</div>
                            </div>`;
                    }
                });

                const totalPerc = Math.round((canceledCount / arkia.length) * 100) || 0;
                document.getElementById('global-index').innerText = totalPerc + "%";
                statusBox.innerText = totalPerc > 25 ? "אזהרה: שיעור ביטולים גבוה" : "הפעילות נראית תקינה";
                
            } catch (err) {
                console.error(err);
                statusBox.innerText = "שגיאה בטעינת נתונים";
            } finally {
                statusBox.classList.remove('loading');
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
