<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנטר טיסה IZ 1335 - 02.04</title>
    <style>
        :root { --danger: #ef4444; --bg: #0d1117; --primary: #58a6ff; --card: #161b22; --success: #3fb950; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: #c9d1d9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: var(--card); border-radius: 28px; padding: 35px; border: 1px solid #30363d; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        .header-label { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin-bottom: 5px; }
        .main-score { font-size: 90px; font-weight: 900; line-height: 1; margin: 15px 0; letter-spacing: -3px; transition: 0.5s; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 25px 0; }
        .stat-item { background: #010409; padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #21262d; }
        .stat-label { font-size: 14px; color: #8b949e; }
        .stat-val { font-weight: bold; font-size: 15px; }
        .cancel-pill { background: rgba(239, 68, 68, 0.15); color: var(--danger); padding: 4px 12px; border-radius: 20px; font-weight: 900; }

        .banner { display: none; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 13px; text-align: right; animation: fadeIn 0.5s; }
        .banner.opt { background: rgba(63, 185, 80, 0.1); border: 1px solid var(--success); color: var(--success); }
        .banner.pess { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }

        .conclusion-box { background: rgba(88, 166, 255, 0.05); border-right: 4px solid var(--primary); padding: 18px; border-radius: 12px; text-align: right; margin-top: 10px; }
        .conclusion-title { color: var(--primary); font-weight: bold; font-size: 13px; margin-bottom: 8px; display: block; }
        
        .refresh-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; transition: 0.3s; }
        .refresh-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .refresh-btn:active { transform: scale(0.98); }
        
        .update-tag { font-size: 11px; opacity: 0.4; margin-top: 20px; }
        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(-360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header-label">סיכוי לשינוי/ביטול מתווה</div>
    <div id="riskScore" class="main-score">--%</div>

    <div id="optBanner" class="banner opt">🌍 <b>מדד אופטימיות:</b> זוהו סימני רגיעה ב-CNN/Ynet.</div>
    <div id="pessBanner" class="banner pess">⚠️ <b>מדד פסימיות:</b> זוהו דיווחים על הסלמה בחדשות.</div>

    <div class="stats-grid">
        <div class="stat-item">
            <span class="stat-label">ביטולי ארקיע היום (נתב"ג)</span>
            <span id="cancelCount" class="cancel-pill">--</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">סטטוס ב-02.04</span>
            <span id="flightStatus" class="stat-val">סורק...</span>
        </div>
    </div>

    <div class="conclusion-box">
        <span class="conclusion-title">📍 השורה התחתונה:</span>
        <div id="conclusionText" style="font-size: 14px; line-height: 1.5;">מנתח נתונים ומגמות...</div>
    </div>

    <button class="refresh-btn" onclick="update()">
        <span id="refreshIcon">🔄</span>
        רענן נתונים עכשיו
    </button>

    <div id="updateTime" class="update-tag">סנכרון אחרון: --</div>
</div>

<script>
    // הכנס כאן את הלינק שקיבלת מ-Google Apps Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec";

    async function update() {
        const icon = document.getElementById('refreshIcon');
        icon.classList.add('spinning');
        
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            // 1. נתב"ג
            document.getElementById('cancelCount').innerText = data.arkiaStats.totalCancelled;
            document.getElementById('flightStatus').innerText = data.arkiaStats.myFlightStatus;
            
            // 2. חישוב סיכון דינמי
            let score = 10;
            let conclusion = "";
            
            if (data.mתווהDetected) score = 95;
            
            // שקלול חדשות (אופטימיות מורידה, פסימיות מעלה)
            if (data.optimismLevel > 0) {
                score -= Math.min(data.optimismLevel, 40);
                document.getElementById('optBanner').style.display = 'block';
            } else { document.getElementById('optBanner').style.display = 'none'; }
            
            if (data.pessimismLevel > 20) {
                score += 15;
                document.getElementById('pessBanner').style.display = 'block';
            } else { document.getElementById('pessBanner').style.display = 'none'; }

            // 3. קביעת מסקנה
            if (score >= 90) {
                conclusion = "מתווה 'שאגת הארי' בתוקף. הטיסה כנראה תצא מטאבה/עקבה. היערך בהתאם.";
            } else if (score > 60) {
                conclusion = "ישנה אי-ודאות גבוהה. גל ביטולים בארקיע לצד כותרות מעורבות.";
            } else {
                conclusion = "כרגע המגמה נוטה לשגרה, אך יש להמשיך לעקוב אחר הודעות ארקיע.";
            }

            // 4. עדכון ויזואלי
            const scoreEl = document.getElementById('riskScore');
            scoreEl.innerText = Math.max(Math.min(score, 100), 5) + "%";
            scoreEl.style.color = score > 80 ? "var(--danger)" : (score > 50 ? "var(--warning)" : "var(--success)");
            
            document.getElementById('conclusionText').innerText = conclusion;
            document.getElementById('updateTime').innerText = "סנכרון אחרון: " + data.time;

        } catch(e) {
            document.getElementById('conclusionText').innerText = "שגיאה בתקשורת עם השרת.";
        } finally {
            icon.classList.remove('spinning');
        }
    }

    update();
</script>
</body>
</html>
