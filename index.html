<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת מודיעין תעופה - ארקיע Intelligence</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --primary: #38bdf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #f1f5f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        
        .ai-risk-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 30px; padding: 30px 20px; text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.2); margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .score-big { font-size: 85px; font-weight: 900; line-height: 1; margin: 10px 0; letter-spacing: -3px; }
        .score-label { font-size: 22px; font-weight: bold; margin-bottom: 15px; }

        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .analysis-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; text-align: center; font-size: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .analysis-item b { display: block; font-size: 18px; color: var(--primary); }

        .issues-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: bold; }
        .issues-list { 
            background: var(--card); border-radius: 20px; padding: 10px; 
            max-height: 350px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05);
        }
        .issue-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .issue-row:last-child { border-bottom: none; }

        .tag { padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 11px; }
        .tag-cancel { background: rgba(239,68,68,0.2); color: var(--danger); }
        .tag-delay { background: rgba(245,158,11,0.2); color: var(--warning); }
        
        .progress-bar { background: #334155; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 15px; }
        .filler { height: 100%; transition: width 1.5s ease-in-out; }
    </style>
</head>
<body>

<div class="container">
    <div class="ai-risk-card">
        <div style="font-size: 12px; opacity: 0.6; letter-spacing: 1px;">הסתברות משוקללת לביטול (02.04)</div>
        <div id="mainScore" class="score-big">--%</div>
        <div id="mainLabel" class="score-label">מנתח מערכות...</div>
        
        <div class="progress-bar">
            <div id="filler" class="filler" style="width: 0%; background: var(--primary);"></div>
        </div>
    </div>

    <div class="analysis-grid">
        <div class="analysis-item">יציבות ארקיע <b id="arkiaStat">0%</b></div>
        <div class="analysis-item">מדד נתב"ג <b id="natbagStat">0%</b></div>
        <div class="analysis-item">סיכון קו רומא <b id="romeStat">נמוך</b></div>
        <div class="analysis-item">סטטוס מדיה <b id="mediaStat">שגרה</b></div>
    </div>

    <div class="issues-header">
        <span>⚠️ כל השיבושים בארקיע (זמן אמת)</span>
        <span id="issueCount" style="background:var(--danger); padding:2px 10px; border-radius:10px; font-size:12px;">0</span>
    </div>

    <div id="fullList" class="issues-list">
        <div style="text-align:center; padding:30px; opacity:0.5;">סורק לוח טיסות ארקיע...</div>
    </div>
</div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec"; // החלף בכתובת ה-Google Apps Script שלך

    async function runIntelligence() {
        try {
            const response = await fetch(PROXY_URL);
            const data = await response.json();
            const records = data.result.records;

            // 1. נתוני נתב"ג כלליים
            const natbagCanceled = records.filter(f => String(f.CHRMINE || "").includes('CANCELED')).length;
            const natbagRate = (natbagCanceled / records.length) * 100;

            // 2. ניתוח ארקיע מפורט
            const arkia = records.filter(f => String(f.CHOPER || "").includes('IZ'));
            const arkiaCanceled = arkia.filter(f => String(f.CHRMINE || "").includes('CANCELED'));
            const arkiaDelayed = arkia.filter(f => (String(f.CHRMINE || "").includes('DELAYED')) || (f.CHPTOL && f.CHSTOL !== f.CHPTOL));
            const arkiaRate = (arkiaCanceled.length / arkia.length) * 100;

            // 3. ניתוח יעד (רומא)
            const romeFlights = arkia.filter(f => String(f.CHLOC1TH || "").includes('רומא') || String(f.CHLOC1T || "").includes('ROME'));
            const romeCanceled = romeFlights.filter(f => String(f.CHRMINE || "").includes('CANCELED')).length;
            const romeRiskLabel = romeCanceled > 0 ? "גבוה 🚨" : "יציב ✅";

            // 4. ניתוח סמנטי (מדיה אוטומטית)
            const alertWords = ["בטחוני", "סגור", "מבצעי", "בשל המצב", "שביתה", "NOTAM"];
            let alertScore = 0;
            records.forEach(f => {
                const remarks = String(f.CHRMINE || "");
                if (alertWords.some(word => remarks.includes(word))) alertScore += 2;
            });
            if (alertScore > 40) alertScore = 40;

            // 5. חישוב הציון המשוקלל (הלב של המערכת)
            let finalScore = Math.round((arkiaRate * 0.35) + (natbagRate * 0.25) + (romeCanceled * 15) + alertScore);
            if (finalScore > 100) finalScore = 100;

            updateUI(finalScore, arkiaRate, natbagRate, romeRiskLabel, alertScore, arkiaCanceled, arkiaDelayed);

        } catch (e) {
            document.getElementById('mainLabel').innerText = "שגיאה בסנכרון נתונים";
        }
    }

    function updateUI(score, aRate, nRate, rRisk, aLevel, canceled, delayed) {
        const scoreElem = document.getElementById('mainScore');
        const filler = document.getElementById('filler');
        const label = document.getElementById('mainLabel');
        
        scoreElem.innerText = score + "%";
        filler.style.width = score + "%";
        
        let color = "var(--success)";
        if (score > 35) { color = "var(--warning)"; label.innerText = "סיכון בינוני ⚠️"; }
        if (score > 65) { color = "var(--danger)"; label.innerText = "סיכון גבוה 🚨"; }
        if (score <= 35) { label.innerText = "מצב יציב ✅"; }
        
        scoreElem.style.color = color;
        filler.style.background = color;

        document.getElementById('arkiaStat').innerText = Math.round(aRate) + "%";
        document.getElementById('natbagStat').innerText = Math.round(nRate) + "%";
        document.getElementById('romeStat').innerText = rRisk;
        document.getElementById('mediaStat').innerText = aLevel > 15 ? "מתח" : "שגרה";

        // רשימת שיבושים מלאה
        const list = document.getElementById('fullList');
        list.innerHTML = "";
        const allIssues = [...canceled, ...delayed];
        document.getElementById('issueCount').innerText = allIssues.length;

        if (allIssues.length === 0) {
            list.innerHTML = "<div style='text-align:center; padding:30px; opacity:0.5;'>אין שיבושים רשמיים בארקיע כרגע</div>";
        } else {
            allIssues.forEach(f => {
                const isC = String(f.CHRMINE).includes('CANCELED');
                const time = f.CHSTOL.split('T')[1].substring(0,5);
                list.innerHTML += `
                    <div class="issue-row">
                        <div>
                            <span style="opacity:0.6; font-size:11px;">${time}</span><br>
                            <b>IZ ${f.CHFLTN}</b> ל${f.CHLOC1TH || '---'}
                        </div>
                        <span class="tag ${isC ? 'tag-cancel' : 'tag-delay'}">${isC ? 'מבוטלת' : 'שיבוש/עיכוב'}</span>
                    </div>`;
            });
        }
    }

    runIntelligence();
    setInterval(runIntelligence, 60000); // עדכון כל דקה
</script>
</body>
</html>
