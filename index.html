<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מכ"ם טיסה IZ 1335 - גרסה עוקפת חסימה</title>
    <style>
        :root { --danger: #ef4444; --warning: #f59e0b; --bg: #0d1117; --primary: #58a6ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; padding: 15px; text-align: center; }
        .card { background: #161b22; border-radius: 20px; padding: 25px; border: 2px solid #30363d; max-width: 500px; margin: auto; }
        .score { font-size: 80px; font-weight: 900; color: var(--primary); }
        .status-box { background: #010409; border-radius: 12px; padding: 15px; margin-top: 15px; text-align: right; border-right: 4px solid var(--primary); }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .link-btn { background: #21262d; color: #58a6ff; border: 1px solid #30363d; padding: 8px; border-radius: 6px; display: inline-block; margin-top: 10px; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 14px; opacity: 0.8;">הסתברות לשינוי IZ 1335 ב-02.04</div>
    <div id="riskScore" class="score">--%</div>
    <div id="mainStatus" style="font-weight: bold;">ממתין לעדכון נתונים</div>
    
    <button class="btn-main" onclick="fetchData()">🔄 בדוק נתוני נתב"ג (Live)</button>

    <div class="status-box">
        <div style="font-weight: bold; color: var(--primary);">📡 סטטוס מקורות מידע:</div>
        <div id="apiStatus">• נתב"ג: טרם נסרק</div>
        <div id="manualStatus">• מתווה "שאגת הארי": פעיל (לפי דיווחים)</div>
        <a href="https://www.arkia.com/he/content/updates" target="_blank" class="link-btn">פתח אתר ארקיע לאימות ידני ↗️</a>
        <a href="https://passportnews.co.il/%D7%99%D7%A9%D7%A8%D7%90%D7%9C-%D7%91%D7%9E%D7%9C%D7%97%D7%9E%D7%94" target="_blank" class="link-btn">פתח פספורטניוז לאימות ↗️</a>
    </div>
</div>

<script>
    const PROXY_URL = "כאן_הלינק_של_גוגל_סקריפט";

    async function fetchData() {
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            const records = data.records;

            // חיפוש הטיסה בנתב"ג ל-02.04
            const myFlight = records.find(f => 
                String(f.CHFLTN).includes("1335") && String(f.CHSTD).includes("02/04")
            );

            const isCancelled = myFlight && (String(myFlight.CHRMINE).includes("CANCELED") || String(myFlight.CHRMINE).includes("מבוטלת"));
            const isPostponed = myFlight && (String(myFlight.CHRMINE).includes("POSTPONED") || String(myFlight.CHRMINE).includes("נדחתה"));

            // חישוב ציון סיכון
            let score = 75; // בסיס גבוה בגלל המתווה הידוע
            let statusText = "במעקב (מתווה פעיל)";

            if (isCancelled) {
                score = 100;
                statusText = "בוטלה רשמית בנתב\"ג!";
            } else if (isPostponed) {
                score = 90;
                statusText = "נדחתה בלוח נתב\"ג";
            } else if (myFlight) {
                score = 85;
                statusText = "מופיעה בלוח - סיכון גבוה";
            }

            // עדכון הממשק
            document.getElementById('riskScore').innerText = score + "%";
            document.getElementById('mainStatus').innerText = statusText;
            document.getElementById('apiStatus').innerText = "• נתב\"ג: נסרק בהצלחה (" + (myFlight ? "טיסה נמצאה" : "טרם מופיעה בלוח") + ")";
            document.getElementById('riskScore').style.color = score >= 90 ? "var(--danger)" : "var(--warning)";

        } catch (e) {
            alert("שגיאה בחיבור לנתב\"ג. וודא שה-URL תקין.");
        }
    }
</script>
</body>
</html>
