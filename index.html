<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חמ"ל טיסות ארקיע - יריב</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; margin-bottom: 20px; }
        .index-value { font-size: 5rem; font-weight: 900; color: var(--accent); margin: 10px 0; line-height: 1; }
        .my-flight { background: #1e293b; border: 2px solid var(--accent); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; margin-bottom: 20px; position: relative; }
        .countdown { font-size: 0.85rem; color: var(--accent); margin-top: 10px; font-weight: bold; }
        .flight-list { width: 100%; max-width: 450px; }
        .flight-item { background: rgba(255, 255, 255, 0.05); border-right: 4px solid var(--warning); padding: 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .flight-item.canceled { border-right-color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .btn-refresh { background: var(--accent); color: var(--bg); border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 20px; width: 100%; max-width: 450px; font-size: 1rem; box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.39); }
        .btn-refresh:active { transform: scale(0.98); }
        .status-tag { padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .time-label { font-size: 0.75rem; opacity: 0.6; display: block; margin-bottom: 2px; }
        #stats-text { font-size: 0.8rem; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>

    <button class="btn-refresh" id="refreshBtn" onclick="updateDashboard()">🔄 רענן נתונים עכשיו</button>

    <div class="my-flight">
        <div style="font-size: 0.95rem; opacity: 0.9;">הטיסה שלי לרומא (IZ 1335):</div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
            <b style="font-size: 1.4rem;">04.02 | 07:00</b>
            <span id="my-flight-status" class="status-tag" style="background: #475569;">בדיקה...</span>
        </div>
        <div id="countdown" class="countdown">מחשב זמן נותר...</div>
    </div>

    <div class="card">
        <div style="font-size: 0.9rem; color: #94a3b8; font-weight: 500;">מדד ביטולים ארקיע (48ש')</div>
        <div class="index-value" id="perc">--%</div>
        <div id="trend-msg" style="font-weight: bold;">מתחבר לנתב"ג...</div>
        <div id="stats-text"></div>
    </div>

    <div class="flight-list">
        <h3 style="font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
            <span>⚠️ כל טיסות ארקיע בשיבוש:</span>
            <span id="issue-count" style="font-size: 0.85rem; background: #334155; padding: 2px 8px; border-radius: 10px;">0</span>
        </h3>
        <div id="issues-container"></div>
    </div>

    <script>
        // *** הדבק כאן את הקישור שקיבלת מה-New Deployment בגוגל ***
        const PROXY_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec"; 

        async function updateDashboard() {
            const btn = document.getElementById('refreshBtn');
            const percElem = document.getElementById('perc');
            const trendElem = document.getElementById('trend-msg');
            btn.innerText = "מושך נתונים...";
            
            try {
                // הוספת מנגנון למניעת Cache בדפדפן
                const response = await fetch(PROXY_URL + "?nocache=" + new Date().getTime());
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                const records = data.result.records;

                // סינון טיסות ארקיע (IZ) בלבד
                const arkia = records.filter(f => String(f.CHOPER || "").includes('IZ'));
                
                // סינון כל הטיסות שיש איתן בעיה (מבוטלות, מעוכבות או שזמן ההמראה השתנה)
                const issues = arkia.filter(f => 
                    String(f.CHRMINE || "").includes('CANCELED') || 
                    String(f.CHRMINE || "").includes('DELAYED') ||
                    (f.CHPTOT && f.CHSTOL !== f.CHPTOT)
                );

                const canceled = issues.filter(f => String(f.CHRMINE).includes('CANCELED'));
                const p = Math.round((canceled.length / arkia.length) * 100) || 0;

                // עדכון התצוגה הכללית
                percElem.innerText = p + "%";
                trendElem.innerText = p > 15 ? "🚨 שיבושים משמעותיים" : "✅ מצב יציב";
                trendElem.style.color = p > 15 ? 'var(--danger)' : 'var(--success)';
                document.getElementById('stats-text').innerText = `מתוך ${arkia.length} טיסות, נמצאו ${issues.length} בשיבוש`;
                document.getElementById('issue-count').innerText = issues.length;

                // בדיקה ספציפית לטיסה שלך IZ1335
                const myFlight = arkia.find(f => String(f.CHFLTN) === "1335");
                const myStatusElem = document.getElementById('my-flight-status');
                if (myFlight) {
                    const statusText = String(myFlight.CHRM
