<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkia Monitor | 02.04 Italy</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --text: #f8fafc; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .status-header { background: linear-gradient(135deg, #0284c7, #0369a1); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .risk-value { font-size: 3rem; font-weight: 900; margin: 10px 0; }
        .heatmap-container { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        .destination-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .dest-tag { padding: 8px; border-radius: 8px; font-size: 0.75rem; text-align: center; background: #334155; border: 1px solid transparent; }
        .high-risk { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .low-risk { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .flight-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; border: 1px solid #334155; }
        .prediction-box { background: #0c4a6e; border: 1px solid var(--accent); padding: 15px; border-radius: 15px; margin-top: 20px; }
        button { background: var(--accent); color: #0f172a; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .footer { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-header">
        <div style="font-size:0.9rem; opacity:0.8;">מדד ביטולים ארקיע (כללי)</div>
        <div class="risk-value" id="global-index">--%</div>
        <div id="risk-summary">טוען נתונים...</div>
    </div>

    <div class="heatmap-container">
        <div style="margin-bottom:10px; font-weight:bold; color:var(--accent);">מפת חום יעדים (ביטולים)</div>
        <div class="destination-grid" id="heatmap-grid"></div>
    </div>

    <div id="flights-list"></div>

    <div class="prediction-box">
        <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">📍 תחזית איטליה (02.04)</div>
        <div id="italy-forecast" style="font-size: 0.9rem; line-height: 1.5;">מנתח מגמות...</div>
    </div>

    <button onclick="window.loadData()">🔄 עדכן נתונים (Live)</button>
    
    <div class="footer" id="update-time"></div>
</div>

<script>
    // שימוש ב-window כדי למנוע שגיאות "init is not defined"
    window.loadData = async function() {
        const API_URL = "https://data.gov.il/api/3/action/datastore_search?resource_id=e83f7610-e348-4030-8a10-27297e30c2c1&limit=500";
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const allFlights = data.result.records;
            
            // סינון ארקיע בלבד
            const arkiaFlights = allFlights.filter(f => {
                const operator = String(f.CHOPER || "");
                return operator.includes('IZ') || operator.includes('ARKIA');
            });
            
            processFlights(arkiaFlights);
        } catch (e) {
            console.error(e);
            document.getElementById('risk-summary').innerText = "שגיאה בחיבור לנתב\"ג";
        }
    };

        const list = document.getElementById('flights-list');
