<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנטר טיסות ארקיע - יריב</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; margin-bottom: 20px; }
        .index-value { font-size: 5rem; font-weight: 900; color: var(--accent); margin: 10px 0; line-height: 1; }
        .my-flight { background: #1e293b; border: 2px solid var(--accent); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; margin-bottom: 20px; position: relative; }
        .flight-item { background: rgba(239, 68, 68, 0.15); border-right: 4px solid var(--danger); padding: 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .status-tag { padding: 4px 10px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="my-flight">
        <div style="font-size: 0.95rem; opacity: 0.9;">הטיסה שלי לרומא (02.04):</div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
            <b style="font-size: 1.5rem;">IZ 1335</b>
            <span id="my-flight-status" class="status-tag" style="background: #475569;">טוען...</span>
        </div>
    </div>

    <div class="card">
        <div style="font-size: 1rem; color: #94a3b8;">מדד ביטולים ארקיע (48ש')</div>
        <div class="index-value" id="perc">--%</div>
        <div id="trend-msg" style="font-weight: bold;">מתחבר לנתב"ג...</div>
    </div>

    <div style="width: 100%; max-width: 400px;">
        <h3 style="font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 10px;">❌ ביטולים אחרונים:</h3>
        <div id="canceled-container"></div>
    </div>

    <script>
        // *** הדבק כאן את הקישור החדש שקיבלת מה-New Deployment בשלב 1 ***
        const PROXY_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec"; 

        async function updateDashboard() {
            try {
                // שינוי קריטי כאן: הוספת redirect ושימוש ב-fetch רגיל
                const res = await fetch(PROXY_URL, {
                    method: 'GET',
                    redirect: 'follow'
                });
                
                const data = await res.json();
                const records = data.result.records;

                const arkia = records.filter(f => String(f.CHOPER || "").includes('IZ'));
                const canceledFlights = arkia.filter(f => String(f.CHRMINE || "").includes('CANCELED'));
                
                const p = Math.round((canceledFlights.length / arkia.length) * 100) || 0;
                document.getElementById('perc').innerText = p + "%";
                document.getElementById('trend-msg').innerText = p > 15 ? "🚨 רמת ביטולים גבוהה" : "✅ מצב יציב";
                document.getElementById('trend-msg').style.color = p > 15 ? 'var(--danger)' : 'var(--success)';

                const myFlight = arkia.find(f => String(f.CHFLTN) === "1335");
                const myStatusElem = document.getElementById('my-flight-status');
                if (myFlight) {
                    const isCanceled = String(myFlight.CHRMINE).includes('CANCELED');
                    myStatusElem.innerText = isCanceled ? "מבוטלת" : "בזמן";
                    myStatusElem.style.background = isCanceled ? "var(--danger)" : "var(--success)";
                } else {
                    myStatusElem.innerText = "טרם פורסמה";
                }

                const container = document.getElementById('canceled-container');
                container.innerHTML = canceledFlights.length ? "" : "אין ביטולים כרגע";
                canceledFlights.forEach(f => {
                    container.innerHTML += `<div class="flight-item"><b>IZ ${f.CHFLTN}</b> ל${f.CHLOC1TH} <span>${f.CHSTOL.split('T')[1].substring(0,5)}</span></div>`;
                });

            } catch (e) {
                console.error(e);
                document.getElementById('trend-msg').innerText = "שגיאת חיבור (CORS)";
            }
        }
        updateDashboard();
    </script>
</body>
</html>
