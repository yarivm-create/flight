<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניטור טיסה 02.04 - ארקיע</title>
    <style>
        :root { --danger: #ef4444; --bg: #0d1117; --primary: #58a6ff; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border-radius: 24px; padding: 30px; border: 1px solid #30363d; width: 420px; text-align: center; }
        .main-score { font-size: 80px; font-weight: 900; color: var(--danger); margin: 5px 0; }
        .conclusion-box { background: rgba(88,166,255,0.05); border: 1px solid var(--primary); padding: 15px; border-radius: 12px; text-align: right; margin-top: 20px; }
        .conclusion-title { color: var(--primary); font-weight: bold; font-size: 14px; margin-bottom: 5px; border-bottom: 1px solid var(--primary); display: inline-block; }
        .stat-line { font-size: 13px; margin: 8px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; padding-bottom: 4px; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 12px; opacity: 0.6;">סיכוי לשינוי מתווה (02.04)</div>
    <div id="riskScore" class="main-score">--%</div>
    
    <div style="padding: 10px;">
        <div class="stat-line"><span>ביטולי ארקיע היום (נתב"ג):</span> <b id="cancelCount" style="color:var(--danger)">--</b></div>
        <div class="stat-line"><span>סטטוס הטיסה שלך (02.04):</span> <b id="myFlight">סורק...</b></div>
    </div>

    <div class="conclusion-box">
        <div class="conclusion-title">📍 השורה התחתונה:</div>
        <div id="conclusionText" style="font-size: 14px; line-height: 1.5;">מנתח נתונים מהמקורות...</div>
    </div>
    
    <div id="updateTime" style="font-size: 10px; opacity: 0.4; margin-top: 20px;"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6hFDEjJZotHSxOJg3PYUKFm8AHWizcD87zIITUVJT-YrCGUSvbqIDYSgsl7MvM8M8Yw/exec";

    async function update() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            document.getElementById('cancelCount').innerText = data.arkiaStats.totalCancelled;
            document.getElementById('myFlight').innerText = data.arkiaStats.myFlightStatus;

            // לוגיקת המסקנה
            let score = 10;
            let conclusion = "";

            if (data.mתווהDetected) {
                score = 95;
                conclusion = "זוהה מתווה 'שאגת הארי' המציין שטיסות רומא הועברו לטאבה. הסיכוי לטיסה רגילה מנתב\"ג אפסי.";
            } else if (data.arkiaStats.totalCancelled > 10) {
                score = 60;
                conclusion = "יש גל ביטולים משמעותי בארקיע כרגע. למרות שרומא עוד לא הופיעה כמבוטלת, יש סיכון גבוה לשינוי.";
            } else {
                conclusion = "כרגע אין אינדיקציה לביטול גורף, אך מומלץ לעקוב אחר הודעות מארקיע.";
            }

            if (data.arkiaStats.myFlightStatus.includes("מבוטלת")) {
                score = 100;
                conclusion = "הטיסה בוטלה רשמית בלוח נתב\"ג. פעל לפי הנחיות ארקיע למתווה חילוץ.";
            }

            document.getElementById('riskScore').innerText = score + "%";
            document.getElementById('conclusionText').innerText = conclusion;
            document.getElementById('riskScore').style.color = score > 80 ? "var(--danger)" : (score > 40 ? "var(--warning)" : "var(--primary)");
            document.getElementById('updateTime').innerText = "עדכון אחרון: " + data.time;

        } catch(e) { document.getElementById('conclusionText').innerText = "שגיאה בחיבור לשרת הניטור."; }
    }
    update();
    setInterval(update, 300000);
</script>
</body>
</html>
